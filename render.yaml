services:
  - type: web
    name: api
    runtime: node
    repo: https://github.com/august-web/chambey-nonprofit-directory
    buildCommand: npm install && npx tsc
    startCommand: node dist/cli.js serve
    healthCheckPath: /stats
    envVars:
      - key: MONGODB_URI
        value: SET_ME_IN_RENDER_DASHBOARD
      - key: DB_NAME
        value: nonprofit_directory
      - key: PORT
        value: "10000"
